name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
          - name: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            platform: macos
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Windows bundle
        if: matrix.platform == 'windows'
        working-directory: apps/desktop
        shell: pwsh
        env:
          RUSTUP_TOOLCHAIN: stable-x86_64-pc-windows-msvc
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Build macOS bundle
        if: matrix.platform == 'macos'
        working-directory: apps/desktop
        shell: bash
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find apps/desktop/src-tauri/target -path '*/release/bundle/nsis/*.exe' -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-assets/ClaudeDesktopPlusPlus-${{ matrix.name }}-$(basename "$file")"
          done
          find apps/desktop/src-tauri/target -path '*/release/bundle/dmg/*.dmg' -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-assets/ClaudeDesktopPlusPlus-${{ matrix.name }}-$(basename "$file")"
          done
          find apps/desktop/src-tauri/target -path '*/release/bundle/macos/*.app' -type d -print0 | while IFS= read -r -d '' app; do
            app_name="$(basename "$app")"
            tar -czf "release-assets/ClaudeDesktopPlusPlus-${{ matrix.name }}-${app_name}.tar.gz" -C "$(dirname "$app")" "$app_name"
          done
          if [ -z "$(ls -A release-assets)" ]; then
            echo "No release artifacts found"
            find apps/desktop/src-tauri/target -maxdepth 6 -type f | sort | tail -200
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeDesktopPlusPlus-${{ matrix.name }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
